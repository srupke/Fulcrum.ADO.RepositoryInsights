name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit
        id: audit
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          if npm audit --audit-level=high --json > audit.json 2>&1; then
            echo "✅ No high or critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
            echo "failed=false" >> $GITHUB_OUTPUT
          else
            echo "❌ High or critical vulnerabilities detected:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            npm audit --audit-level=high 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment on failure
        if: steps.audit.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const lines = [
              '## Security Audit Failed',
              '',
              '❌ High or critical vulnerabilities detected.',
              '',
              'Run `npm audit` locally to see details, or `npm audit fix` to resolve.',
              'If a fix requires a breaking change, pin to a safe version or open a follow-up issue.',
            ];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });

      - name: Fail if high vulnerabilities found
        if: steps.audit.outputs.failed == 'true'
        run: exit 1
